server {
    listen 3000;  # Change this to listen on port 3000

    # Proxy API requests to the backend running on port 8080
    location /api/ {
        proxy_pass https://reci-pa-ispeci-q8z2.onrender.com:8080;  # Backend URL (adjust for your service name)
        proxy_ssl_server_name on;                # Enable if the backend is HTTPS
        proxy_read_timeout 60s;                  # Optional: increase timeout for backend responses
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Serve React frontend
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
